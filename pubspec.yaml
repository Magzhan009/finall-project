name: finall_project
description: "A Flutter prototype for JIHC hall booking, booking status tracking, and student-admin chat."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cloud_firestore: ^6.4.1
  cupertino_icons: ^1.0.9
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  flutter:
    sdk: flutter
  google_sign_in: ^7.2.0
  image: ^4.8.0
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/jihc_logo.png
